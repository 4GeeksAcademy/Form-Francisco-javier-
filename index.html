<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario</title>
  <link rel="stylesheet" href="styles.css" class="css">
  <script src="https://kit.fontawesome.com/27b08b1d4b.js" crossorigin="anonymous"></script>

<body>
  <div class="card p-5,5,5,5" Style=" display:flex; margin-left:50px; margin-right:50px; margin-top:50px; margin-bottom:50px;">
    <div class="card-header">
      <h1>Payment form example</h1>
    </div>
    <div class="card-body"><!-- formulario -->
      <div class="alert alert-danger" role="alert">
        Some fields are missing
      </div><!--hacer mas fino-->
     <form class="row g-3 needs-validation" novalidate>
  <div class="col-md-4">
    <label for="validationCustom01" class="form-label">Card #</label>
    <input type="text" class="form-control" id="validationCustom01" placeholder="XXXXXXXXXXXXXXXXX" >
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>
  <div class="col-md-4">
    <label for="validationCustom02" class="form-label">CVC #</label>
    <input type="text" class="form-control" id="validationCustom02" placeholder="0000" required>
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>
  <div class="col-md-4">
    <label for="validationCustomUsername" class="form-label">Amount</label>
    <div class="input-group has-validation">
      <div class="input--text">$</div>
      <input type="text" class="form-control" id="validationCustomUsername" placeholder="Amount" required>
      <div class="invalid-feedback">
        Please enter an amount.
      </div>
    </div>
  </div>
   <div class="col-md-6">
    <label for="text" class="form-label">First Name</label>
    <input type="text" class="form-control" id="text">
  </div>
  <div class="col-md-6">
    <label for="text" class="form-label">Last Name</label>
    <input type="text" class="form-control" id="text">
  </div>
  <div class="col-md-6">
    <label for="validationCustom03" class="form-label">City</label>
    <input type="text" class="form-control" id="validationCustom03" required>
    <div class="invalid-feedback">
      Please provide a valid city.
    </div>
  </div>
  <div class="col-md-3">
    <label for="validationCustom04" class="form-label">State</label>
    <select class="form-select" id="validationCustom04" required>
      <option selected disabled value="">Pick a state</option>
      <option>...</option>
    </select>
    <div class="invalid-feedback">
      Please select a valid state.
    </div>
  </div>
  <div class="col-md-3">
    <label for="validationCustom05" class="form-label">Postal Code</label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
      Please provide a valid zip.
    </div>
  </div>
  <div class="col-12">
    
  </div>
 
</form>
 <p class="form-text">We accept:</p>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
  <label class="form-check-label" for="inlineRadio1"><i class="fa-brands fa-cc-mastercard"></i></label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
  <label class="form-check-label" for="inlineRadio2"><i class="fa-brands fa-cc-visa"></i></label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
  <label class="form-check-label" for="inlineRadio1"><i class="fa-brands fa-cc-diners-club"></i></label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
  <label class="form-check-label" for="inlineRadio2"><i class="fa-brands fa-cc-amex"></i></label>
</div>
<div class="mb-3" style="margin-left: 300px; margin-top: -50px;">
  <label for="exampleFormControlTextarea1" class="form-label">Message</label>
  <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
  <p class="form-text">Add any note here.</p>
</div>
    </div><!--fin del formulario-->
    <div class="card-footer text-end">
      <button type="button" class="btn btn-secondary btn-sm">Cancel</button>
      <button type="button" class="btn btn-primary btn-sm">Send</button>
    </div>
  </div>
</body>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
  integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</html>
